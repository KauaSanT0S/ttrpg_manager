<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <nav id="nav">
        <h1>Criador de Ficha</h1>
    </nav>
    
    <div id="main">
        <aside id="aside">
            <div id="attributes">
                <h2>Atributos</h2>
                <table id="atrTable">
                    <tr>
                        <th>Força:<br>12</th>
                        <th>Destreza:<br>21</th>
                        <th>Constituição:<br>10</th>
                    </tr>
                    <tr>
                        <th>Inteligência:<br>14</th>
                        <th>Sabedoria:<br>21</th>
                        <th>Carisma:<br>14</th>
                    </tr>
                </table>
            </div>
            <div id="skills">
                <h2>Poderes</h2>
            </div>
        </aside>
        <div id="info">
            <h2>Ficha</h2>
            <div id="mainInfo">
                <img src="images/alaric.png" alt="Alaric" id="icon">
                <table id="infoTable">
                    <tr>
                        <th>Nome: Alaric</th>
                        <th>HP: 35/35</th>
                    </tr>
                    <tr>
                        <th>Raça: Humano</th>
                        <th>MP: 41/41 </th>
                    </tr>
                    <tr>
                        <th>Classe: Druida</th>
                        <th>Defesa: 17</th>
                    </tr>
                </table>
            </div>
        </div>
    </div>




</body>
</html>
